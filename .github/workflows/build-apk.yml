name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > speakeasy-android/local.properties

      - name: Generate Gradle Wrapper
        run: |
          cd speakeasy-android
          gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        run: |
          cd speakeasy-android
          chmod +x gradlew
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeakEasy-APK
          path: speakeasy-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
